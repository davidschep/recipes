# This is a basic workflow to help you get started with Actions

name: Upload to Github Pages

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the main branch
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout
        uses: actions/checkout@v2
        with:
          persist-credentials: false

      - name: Install WebP tools
        run: sudo apt-get update && sudo apt-get install -y webp imagemagick

      - name: Compress images to WebP
        run: |
          mkdir -p images/thumbnails
          
          # Process all image files
          for img in images/*.{jpg,jpeg,png,gif}; do
            if [ -f "$img" ]; then
              filename=$(basename "$img")
              name="${filename%.*}"
              
              # Create WebP versions
              cwebp -q 85 "$img" -o "images/${name}.webp" || true
              
              # Create thumbnails (100x100) in WebP
              convert "$img" -resize 100x100 -quality 85 "images/thumbnails/${name}-thumb.webp" || true
            fi
          done
        
      - name: Generate recipelist.json
        run: python3 generate.py
        
      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@3.7.1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: gh-pages
          FOLDER: build
